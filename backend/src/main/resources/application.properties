# Carga las variables de .env (no se commitea, ver .env.example) como si fuera un application.properties.
# Sintaxis [.properties]: le dice a Spring que parsee el archivo .env como properties aunque no tenga esa extension.
spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# Ejecutar schema.sql contra PostgreSQL (por defecto Spring Boot solo lo hace en BDs embebidas)
spring.sql.init.mode=always

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.mundial2026=DEBUG

# Application Name
spring.application.name=Mundial 2026 Backend
